name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Windows ─────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npm run dist:win

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            release/*.exe
            release/*.blockmap

  # ── Linux (Ubuntu) ───────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxtst-dev libx11-dev libxkbfile-dev

      - name: Install dependencies
        run: npm ci

      - name: Build Linux
        run: npm run dist:linux:ci

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            release/*.AppImage
            release/*.deb

  # ── macOS ────────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS
        run: npm run dist:mac

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: release/*.dmg

  # ── Release (solo su tag v*) ─────────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Skuoty ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/windows/*.exe
            artifacts/windows/*.blockmap
            artifacts/linux/*.AppImage
            artifacts/linux/*.deb
            artifacts/macos/*.dmg
